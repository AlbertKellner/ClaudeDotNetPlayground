name: Validar Endpoint de Tempo

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

jobs:
  validate-weather:
    runs-on: ubuntu-latest
    environment: ClaudeCode
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restaurar dependências
        run: dotnet restore src/ClaudeDotNetPlayground/ClaudeDotNetPlayground.csproj

      - name: Iniciar aplicação e aguardar disponibilidade
        run: |
          ASPNETCORE_URLS=http://localhost:5000 dotnet run \
            --project src/ClaudeDotNetPlayground/ClaudeDotNetPlayground.csproj \
            --no-restore > run.log 2>&1 &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> $GITHUB_ENV

          echo "Aplicação iniciada com PID $APP_PID"
          echo "Aguardando aplicação ficar disponível..."

          STARTED=false
          for i in $(seq 1 30); do
            sleep 2

            if ! kill -0 $APP_PID 2>/dev/null; then
              echo ""
              echo "❌ Processo da aplicação encerrou inesperadamente após $((i * 2))s"
              echo ""
              echo "=== Output da Aplicação ==="
              cat run.log
              exit 1
            fi

            if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
              STARTED=true
              break
            fi

            echo "  Tentativa $i/30 — ainda não disponível..."
          done

          if [ "$STARTED" = "false" ]; then
            echo ""
            echo "❌ Aplicação não iniciou em 60 segundos"
            echo ""
            echo "=== Output da Aplicação ==="
            cat run.log
            kill $APP_PID 2>/dev/null || true
            exit 1
          fi

          echo ""
          echo "✅ Aplicação disponível"

      - name: Gerar token JWT via POST /login
        run: |
          echo "Obtendo token JWT via POST http://localhost:5000/login ..."
          echo ""

          LOGIN_HTTP_STATUS=$(curl -s -o /tmp/login.json -w "%{http_code}" \
            -X POST http://localhost:5000/login \
            -H "Content-Type: application/json" \
            -d '{"userName":"Albert","password":"albert123"}')

          echo "Status do login: $LOGIN_HTTP_STATUS"

          if [ "$LOGIN_HTTP_STATUS" != "200" ]; then
            echo "❌ Falha no login — HTTP $LOGIN_HTTP_STATUS"
            echo ""
            echo "=== Resposta ==="
            cat /tmp/login.json
            exit 1
          fi

          TOKEN=$(grep -o '"token":"[^"]*"' /tmp/login.json | cut -d'"' -f4)

          if [ -z "$TOKEN" ]; then
            echo "❌ Token não encontrado na resposta do login"
            echo ""
            echo "=== Resposta ==="
            cat /tmp/login.json
            exit 1
          fi

          echo "JWT_TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "✅ Token obtido com sucesso"

      - name: Validar GET /weather-conditions com Bearer Token
        run: |
          echo "Chamando GET http://localhost:5000/weather-conditions ..."
          echo ""

          HTTP_STATUS=$(curl -s -o /tmp/weather.json -w "%{http_code}" \
            -H "Authorization: Bearer $JWT_TOKEN" \
            http://localhost:5000/weather-conditions)

          RESPONSE=$(cat /tmp/weather.json)

          echo "=== Resultado do Endpoint de Tempo ==="
          echo "Status: $HTTP_STATUS"
          echo "Body:   $RESPONSE"
          echo ""

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Endpoint de tempo validado com sucesso — HTTP 200"
          else
            echo "❌ Endpoint de tempo falhou — HTTP $HTTP_STATUS"
            exit 1
          fi

      - name: Encerrar aplicação
        if: always()
        run: kill $APP_PID 2>/dev/null || true
