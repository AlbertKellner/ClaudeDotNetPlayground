name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Native AOT toolchain
        run: sudo apt-get install -y clang zlib1g-dev

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore src/ClaudeDotNetPlayground/ClaudeDotNetPlayground.csproj

      - name: Build (Native AOT publish)
        run: |
          dotnet publish src/ClaudeDotNetPlayground/ClaudeDotNetPlayground.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained
