name: Governança de Metadados de PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited

jobs:
  validate-pr-metadata:
    name: Validar Metadados do PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Verificar título do PR
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Título do PR: $PR_TITLE"

          # Verificar se o título segue o padrão de Semantic Commits
          if echo "$PR_TITLE" | grep -qE "^(feat|fix|docs|refactor|test|chore|ci|style|perf|build|revert)(\([^)]+\))?: .+"; then
            echo "✅ Título segue o padrão de Semantic Commits"
          else
            echo "❌ Título não segue o padrão de Semantic Commits"
            echo ""
            echo "O título deve seguir o formato: <tipo>(<escopo>): <descrição>"
            echo "Tipos aceitos: feat, fix, docs, refactor, test, chore, ci, style, perf, build, revert"
            echo ""
            echo "Exemplos válidos:"
            echo "  feat(auth): adicionar endpoint de login com JWT"
            echo "  fix(health-check): corrigir retorno quando Datadog bloqueia IPs privados"
            echo "  docs(wiki): documentar arquitetura e features implementadas"
            exit 1
          fi

      - name: Verificar idioma do título (português brasileiro)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Verificar se o título está em português (heurística: parte após ':' deve ter palavras em pt-BR)
          DESCRIPTION=$(echo "$PR_TITLE" | sed 's/^[^:]*: //')

          # Verificar se há caracteres ASCII only com palavras muito curtas (indício de inglês)
          # Esta é uma verificação básica - não bloqueia, apenas avisa
          if echo "$DESCRIPTION" | grep -qiE "\b(add|create|update|fix|remove|implement|refactor|test|change|improve|enable|disable|configure)\b"; then
            echo "⚠️  Aviso: O título parece estar em inglês. O título deve ser escrito em português brasileiro."
            echo "   Título detectado: $DESCRIPTION"
          else
            echo "✅ Título parece estar em português"
          fi

      - name: Verificar corpo do PR
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ]; then
            echo "❌ O corpo do PR está vazio"
            echo ""
            echo "O PR deve ter uma descrição estruturada com as três seções obrigatórias:"
            echo "  1. Motivos da alteração"
            echo "  2. Plano de execução"
            echo "  3. O que foi realizado"
            exit 1
          fi

          MISSING_SECTIONS=""

          if ! echo "$PR_BODY" | grep -q "Motivos da alteração"; then
            MISSING_SECTIONS="$MISSING_SECTIONS\n  - Motivos da alteração"
          fi

          if ! echo "$PR_BODY" | grep -q "Plano de execução"; then
            MISSING_SECTIONS="$MISSING_SECTIONS\n  - Plano de execução"
          fi

          if ! echo "$PR_BODY" | grep -q "O que foi realizado"; then
            MISSING_SECTIONS="$MISSING_SECTIONS\n  - O que foi realizado"
          fi

          if [ -n "$MISSING_SECTIONS" ]; then
            echo "❌ As seguintes seções obrigatórias estão ausentes na descrição do PR:"
            echo -e "$MISSING_SECTIONS"
            echo ""
            echo "Utilize o template em .github/pull_request_template.md como base."
            exit 1
          fi

          echo "✅ Descrição do PR contém as três seções obrigatórias"

      - name: Adicionar labels automáticas
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title.toLowerCase();
            const branch = context.payload.pull_request.head.ref.toLowerCase();

            const labelsToAdd = [];

            // Determinar tipo pelo prefixo do Semantic Commit
            if (title.startsWith('feat')) labelsToAdd.push('feature');
            else if (title.startsWith('fix')) labelsToAdd.push('bugfix');
            else if (title.startsWith('docs')) labelsToAdd.push('documentation');
            else if (title.startsWith('refactor')) labelsToAdd.push('refactoring');
            else if (title.startsWith('ci') || title.startsWith('chore')) labelsToAdd.push('infrastructure');
            else if (title.startsWith('test')) labelsToAdd.push('testing');
            else if (title.includes('govern') || title.includes('rule') || title.includes('regra')) labelsToAdd.push('governance');

            // Assumir non-breaking por padrão (o autor deve corrigir se for breaking)
            labelsToAdd.push('non-breaking');

            // Criar labels se não existirem e adicionar ao PR
            const labelConfigs = {
              'feature': { color: '0075ca', description: 'Nova funcionalidade implementada' },
              'bugfix': { color: 'd73a4a', description: 'Correção de bug ou comportamento incorreto' },
              'documentation': { color: '0052cc', description: 'Criação ou atualização de documentação' },
              'refactoring': { color: 'e4e669', description: 'Refatoração sem mudança de comportamento' },
              'governance': { color: 'fbca04', description: 'Atualização de regras, governança ou processo' },
              'infrastructure': { color: 'f9d0c4', description: 'Docker, CI/CD, scripts de ambiente' },
              'testing': { color: '006b75', description: 'Adição ou correção de testes' },
              'breaking-change': { color: 'b60205', description: 'Altera interface pública, contrato ou comportamento esperado' },
              'non-breaking': { color: '0e8a16', description: 'Mudança compatível com versão atual' },
            };

            // Criar labels que não existem
            const existingLabels = await github.rest.issues.listLabelsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const existingLabelNames = existingLabels.data.map(l => l.name);

            for (const labelName of labelsToAdd) {
              if (!existingLabelNames.includes(labelName) && labelConfigs[labelName]) {
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: labelName,
                    color: labelConfigs[labelName].color,
                    description: labelConfigs[labelName].description,
                  });
                  console.log(`Label criada: ${labelName}`);
                } catch (e) {
                  console.log(`Aviso ao criar label ${labelName}: ${e.message}`);
                }
              }
            }

            // Adicionar labels ao PR
            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: labelsToAdd,
              });
              console.log(`Labels adicionadas ao PR #${context.payload.pull_request.number}: ${labelsToAdd.join(', ')}`);
            }
