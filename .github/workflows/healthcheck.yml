name: Healthcheck

on:
  workflow_run:
    workflows:
      - Run
    types:
      - completed

jobs:
  healthcheck:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: published-app
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./app

      - name: Start application and wait for readiness
        run: |
          chmod +x ./app/ClaudeDotNetPlayground

          ASPNETCORE_URLS=http://localhost:5000 ./app/ClaudeDotNetPlayground > run.log 2>&1 &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> $GITHUB_ENV

          echo "Application started with PID $APP_PID"
          echo "Waiting for application to be ready..."

          STARTED=false
          for i in $(seq 1 30); do
            sleep 2

            if ! kill -0 $APP_PID 2>/dev/null; then
              echo ""
              echo "❌ Application process exited unexpectedly after $((i * 2))s"
              echo ""
              echo "=== Application Output ==="
              cat run.log
              exit 1
            fi

            if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
              STARTED=true
              break
            fi

            echo "  Attempt $i/30 — not ready yet..."
          done

          if [ "$STARTED" = "false" ]; then
            echo ""
            echo "❌ Application failed to start within 60 seconds"
            echo ""
            echo "=== Application Output ==="
            cat run.log
            kill $APP_PID 2>/dev/null || true
            exit 1
          fi

          echo "Application is ready"

      - name: Call health check endpoint
        run: |
          echo "Calling GET http://localhost:5000/health ..."
          echo ""

          HTTP_STATUS=$(curl -s -o /tmp/health_response.txt -w "%{http_code}" http://localhost:5000/health)
          RESPONSE=$(cat /tmp/health_response.txt)

          echo "=== Health Check Result ==="
          echo "Status: $HTTP_STATUS"
          echo "Body:   $RESPONSE"
          echo ""

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Health check passed — application is healthy"
          else
            echo "❌ Health check failed — application returned HTTP $HTTP_STATUS"
            exit 1
          fi

      - name: Stop application
        if: always()
        run: kill $APP_PID 2>/dev/null || true
