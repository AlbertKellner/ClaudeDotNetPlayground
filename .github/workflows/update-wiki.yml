name: Atualizar Documentação da Wiki

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'

permissions:
  contents: write

jobs:
  update-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Fazer checkout do repositório
        uses: actions/checkout@v4

      - name: Gerar páginas da Wiki
        run: python3 .github/scripts/generate_wiki.py

      - name: Publicar na Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git wiki_repo
          cp wiki_output/*.md wiki_repo/
          cd wiki_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "docs: atualiza wiki a partir do commit ${{ github.sha }}"
          git push
