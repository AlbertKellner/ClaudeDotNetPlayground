name: Run

on:
  workflow_run:
    workflows:
      - Build
    types:
      - completed

jobs:
  run:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: published-app
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./app

      - name: Run application and verify startup
        run: |
          chmod +x ./app/ClaudeDotNetPlayground

          ASPNETCORE_URLS=http://localhost:5000 ./app/ClaudeDotNetPlayground > run.log 2>&1 &
          APP_PID=$!

          echo "Application started with PID $APP_PID"
          echo "Waiting for application to be ready..."

          STARTED=false
          for i in $(seq 1 30); do
            sleep 2

            if ! kill -0 $APP_PID 2>/dev/null; then
              echo ""
              echo "❌ Application process exited unexpectedly after $((i * 2))s"
              echo ""
              echo "=== Application Output ==="
              cat run.log
              exit 1
            fi

            if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
              STARTED=true
              break
            fi

            echo "  Attempt $i/30 — not ready yet..."
          done

          if [ "$STARTED" = "false" ]; then
            echo ""
            echo "❌ Application failed to start within 60 seconds"
            echo ""
            echo "=== Application Output ==="
            cat run.log
            kill $APP_PID 2>/dev/null || true
            exit 1
          fi

          echo ""
          echo "✅ Application started successfully"
          kill $APP_PID 2>/dev/null || true

      - name: Re-upload artifact for healthcheck workflow
        uses: actions/upload-artifact@v4
        with:
          name: published-app
          path: ./app/ClaudeDotNetPlayground
          if-no-files-found: error
          overwrite: true
